name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          GITHUB_ACTIONS: 'true'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "=== Java Detection ==="
          which java
          java -version 2>&1
          echo "JAVA_HOME=$JAVA_HOME"
          echo "=== Available JDKs ==="
          ls -la /usr/lib/jvm/ 2>/dev/null || echo "no /usr/lib/jvm"
          update-java-alternatives -l 2>/dev/null || echo "no alternatives"
          echo "=== Gradle JDK Info ==="
          ./gradlew -version 2>&1 || true
          echo "=== Build ==="
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: economy-lab-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
